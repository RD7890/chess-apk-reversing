name: Recompile Patched APK

on:
  push:
    paths:
      - 'decompiled/**'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Folder name under decompiled/ (blank = auto-detect all changed)'
        required: false
        default: ''

permissions:
  contents: write

# ─── Job 1: figure out which apps changed ────────────────────────────────────
jobs:
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    # Never run when auto-decompile bot pushes back to decompiled/
    if: github.actor != 'github-actions[bot]'
    outputs:
      apps: ${{ steps.find.outputs.apps }}
      has_apps: ${{ steps.find.outputs.has_apps }}

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed app directories
        id: find
        run: |
          if [ -n "${{ github.event.inputs.app_name }}" ]; then
            APPS="${{ github.event.inputs.app_name }}"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
              APPS=$(ls decompiled/ 2>/dev/null | tr '\n' ' ')
            else
              APPS=$(git diff --name-only "$BEFORE" "$AFTER" \
                | grep '^decompiled/' \
                | awk -F'/' '{print $2}' \
                | sort -u | tr '\n' ' ')
            fi
          fi
          APPS=$(echo "$APPS" | xargs)   # trim whitespace
          echo "Apps to build: [$APPS]"

          if [ -z "$APPS" ]; then
            echo "apps=[]"       >> $GITHUB_OUTPUT
            echo "has_apps=false" >> $GITHUB_OUTPUT
          else
            JSON="["
            for app in $APPS; do
              [ -d "decompiled/$app" ] || continue
              JSON="${JSON}\"${app}\","
            done
            JSON="${JSON%,}]"
            echo "apps=$JSON"    >> $GITHUB_OUTPUT
            echo "has_apps=true" >> $GITHUB_OUTPUT
            echo "Matrix: $JSON"
          fi

# ─── Job 2: build, sign, release — one job per app ───────────────────────────
  build:
    name: Build ${{ matrix.app }}
    needs: detect
    if: needs.detect.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      # ── Cache apktool jar ──────────────────────────────────────────────────
      - name: Cache apktool
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/apktool.jar
          key: apktool-2.9.3

      - name: Install apktool 2.9.3
        run: |
          if [ ! -f /usr/local/bin/apktool.jar ]; then
            wget -q \
              "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar" \
              -O /usr/local/bin/apktool.jar
          fi
          printf '#!/bin/bash\nexec java -jar /usr/local/bin/apktool.jar "$@"\n' \
            | sudo tee /usr/local/bin/apktool > /dev/null
          sudo chmod +x /usr/local/bin/apktool
          apktool --version

      # ── Locate Android build-tools (zipalign + apksigner) ─────────────────
      - name: Locate Android build-tools
        run: |
          SDK="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          BT=$(ls -d "$SDK/build-tools/"* 2>/dev/null | sort -V | tail -1)
          if [ -z "$BT" ]; then
            echo "ERROR: build-tools not found under $SDK"
            exit 1
          fi
          echo "BUILD_TOOLS=$BT" >> $GITHUB_ENV
          echo "Using build-tools: $BT"

      # ── Generate a debug signing key ───────────────────────────────────────
      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias patcher \
            -keypass 123456 \
            -keystore "$HOME/signing-key.jks" \
            -storepass 123456 \
            -dname "CN=APK Patcher,O=Patch,C=US" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storetype JKS
          echo "KEYSTORE=$HOME/signing-key.jks" >> $GITHUB_ENV

      # ── apktool build ──────────────────────────────────────────────────────
      - name: Recompile with apktool
        run: |
          APP="${{ matrix.app }}"
          mkdir -p output
          echo "▶ apktool b decompiled/$APP"
          apktool b "decompiled/$APP" \
            --output "output/${APP}-unsigned.apk" \
            --force
          echo "Build done — $(du -h output/${APP}-unsigned.apk | cut -f1)"

      # ── zipalign ──────────────────────────────────────────────────────────
      - name: Zipalign
        run: |
          APP="${{ matrix.app }}"
          "$BUILD_TOOLS/zipalign" -v -p 4 \
            "output/${APP}-unsigned.apk" \
            "output/${APP}-aligned.apk"

      # ── apksigner ─────────────────────────────────────────────────────────
      - name: Sign APK
        env:
          SIGNING_STORE_PASSWORD: "123456"
          SIGNING_KEY_PASSWORD: "123456"
        run: |
          APP="${{ matrix.app }}"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias patcher \
            --ks-pass pass:$SIGNING_STORE_PASSWORD \
            --key-pass pass:$SIGNING_KEY_PASSWORD \
            --out "output/${APP}-patched.apk" \
            "output/${APP}-aligned.apk"

      # ── Verify signature ───────────────────────────────────────────────────
      - name: Verify APK
        run: |
          APP="${{ matrix.app }}"
          "$BUILD_TOOLS/apksigner" verify --verbose "output/${APP}-patched.apk"
          echo "✅ Signature verified"
          ls -lh "output/${APP}-patched.apk"

      # ── Get version / build info ───────────────────────────────────────────
      - name: Get app version
        id: version
        run: |
          APP="${{ matrix.app }}"
          VER=$(grep 'versionName=' "decompiled/$APP/apktool.yml" 2>/dev/null \
            | awk -F"'" '{print $2}' | head -1 || echo "patched")
          echo "name=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      # ── Commit patched APK back to repo ───────────────────────────────────
      - name: Commit patched APK
        run: |
          APP="${{ matrix.app }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add "output/${APP}-patched.apk"
          git diff --cached --quiet \
            && echo "APK unchanged, skipping commit" \
            && exit 0
          git commit -m "build(${APP}): v${{ steps.version.outputs.name }} (#${{ github.run_number }}) [skip ci]"
          git push

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.app }}-v${{ steps.version.outputs.name }}-build.${{ github.run_number }}
          name: "${{ matrix.app }} v${{ steps.version.outputs.name }} (Build #${{ github.run_number }})"
          body: |
            **Automated patched build**
            - App: `${{ matrix.app }}`
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Run: #${{ github.run_number }}

            > Install via sideload (enable Unknown sources). Uninstall original first.
          draft: false
          prerelease: false
          files: output/${{ matrix.app }}-patched.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload artifact (backup) ───────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-patched-build${{ github.run_number }}
          path: output/${{ matrix.app }}-patched.apk
          retention-days: 30
