name: Recompile APK

on:
  push:
    paths:
      - 'decompiled/apktool/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool
        run: |
          APKTOOL_VERSION=2.9.3
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VERSION}/apktool_${APKTOOL_VERSION}.jar" -O /usr/local/bin/apktool.jar
          printf '#!/bin/bash\njava -jar /usr/local/bin/apktool.jar "$@"\n' > /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Recompile APK with apktool
        run: |
          apktool b decompiled/apktool --output output/chess-patched-unsigned.apk --force
          echo "Build done"

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore /tmp/debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000
          echo "Keystore ready"

      - name: Align and sign APK
        run: |
          # zipalign
          ${ANDROID_HOME}/build-tools/*/zipalign -v -p 4 \
            output/chess-patched-unsigned.apk \
            output/chess-patched-aligned.apk || \
          zipalign -v -p 4 \
            output/chess-patched-unsigned.apk \
            output/chess-patched-aligned.apk || \
          cp output/chess-patched-unsigned.apk output/chess-patched-aligned.apk

          # apksigner
          ${ANDROID_HOME}/build-tools/*/apksigner sign \
            --ks /tmp/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out output/chess-patched.apk \
            output/chess-patched-aligned.apk || \
          apksigner sign \
            --ks /tmp/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out output/chess-patched.apk \
            output/chess-patched-aligned.apk || \
          cp output/chess-patched-aligned.apk output/chess-patched.apk

          echo "Signing done"
          ls -lh output/chess-patched.apk

      - name: Commit patched APK to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/chess-patched.apk
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "build: recompile patched Chess APK"
          git push

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chess-patched-apk
          path: output/chess-patched.apk
          retention-days: 30
