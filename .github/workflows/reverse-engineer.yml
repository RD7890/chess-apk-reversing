name: Reverse Engineer APK

on:
  push:
    paths:
      - 'apk/*.apk'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool
        run: |
          APKTOOL_VERSION=2.9.3
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VERSION}/apktool_${APKTOOL_VERSION}.jar" -O /usr/local/bin/apktool.jar
          printf '#!/bin/bash\njava -jar /usr/local/bin/apktool.jar "$@"\n' > /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Decompile with apktool
        run: |
          apktool d apk/Chess_2.9.4.apk --output decompiled/apktool --force
          echo "apktool done"

      - name: Install jadx
        run: |
          JADX_VERSION=1.5.0
          wget -q "https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-${JADX_VERSION}.zip" -O /tmp/jadx.zip
          mkdir -p /opt/jadx && cd /opt/jadx && unzip -q /tmp/jadx.zip
          chmod +x /opt/jadx/bin/jadx
          /opt/jadx/bin/jadx --version

      - name: Decompile with jadx
        run: |
          /opt/jadx/bin/jadx apk/Chess_2.9.4.apk --output-dir decompiled/jadx --show-bad-code --threads-count 4
          echo "jadx done"

      - name: Install dex2jar
        run: |
          DEX2JAR_VERSION=2.4
          wget -q "https://github.com/pxb1988/dex2jar/releases/download/v${DEX2JAR_VERSION}/dex-tools-v${DEX2JAR_VERSION}.zip" -O /tmp/dex2jar.zip
          mkdir -p /opt/dex2jar && cd /opt/dex2jar && unzip -q /tmp/dex2jar.zip
          chmod +x /opt/dex2jar/dex-tools-v${DEX2JAR_VERSION}/d2j-dex2jar.sh

      - name: Convert DEX to JAR
        run: |
          DEX2JAR_VERSION=2.4
          mkdir -p decompiled
          /opt/dex2jar/dex-tools-v${DEX2JAR_VERSION}/d2j-dex2jar.sh apk/Chess_2.9.4.apk --output decompiled/chess-classes.jar --force || true
          echo "dex2jar done"

      - name: Build summary
        run: |
          mkdir -p decompiled/summary
          cp decompiled/apktool/AndroidManifest.xml decompiled/summary/ 2>/dev/null || true
          grep -oP 'android:name="\K[^"]+' decompiled/apktool/AndroidManifest.xml \
            | grep -i "permission" > decompiled/summary/permissions.txt 2>/dev/null || true
          SMALI_COUNT=$(find decompiled/apktool/smali* -name "*.smali" 2>/dev/null | wc -l)
          JAVA_COUNT=$(find decompiled/jadx/sources -name "*.java" 2>/dev/null | wc -l)
          cat > decompiled/summary/README.md << EOF
          # Decompiled Output — Chess 2.9.4

          | Tool | Output |
          |------|--------|
          | apktool | \`decompiled/apktool/\` — smali bytecode, resources, AndroidManifest |
          | jadx | \`decompiled/jadx/\` — reconstructed Java source |
          | dex2jar | \`decompiled/chess-classes.jar\` — JAR for IntelliJ / JD-GUI |

          ## Stats
          - Smali classes: ${SMALI_COUNT}
          - Java classes: ${JAVA_COUNT}

          ## Permissions
          $(cat decompiled/summary/permissions.txt 2>/dev/null || echo "none")
          EOF
          echo "Summary done — smali: $SMALI_COUNT, java: $JAVA_COUNT"

      - name: Commit decompiled output to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add decompiled/
          git diff --cached --quiet && echo "Nothing changed, skipping commit" && exit 0
          git commit -m "chore: update decompiled output from Chess_2.9.4.apk"
          git push

      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-output
          path: decompiled/
          retention-days: 30
